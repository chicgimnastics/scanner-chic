<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/@zxing/library@latest"></script>
</head>

<body>

<h2>Escanear Zapatillas CHIC 2026 V5</h2>

<video id="video" width="300"></video>

<script>

const codeReader = new ZXing.BrowserBarcodeReader()
const video = document.getElementById('video')

let controls = null

function startScanner() {
    codeReader.decodeFromVideoDevice(null, video, (result, err, ctrl) => {

        if (!controls) controls = ctrl

        if (result) {

            // 🛑 detener cámara COMPLETAMENTE
            controls.stop()

            fetch("https://script.google.com/macros/s/AKfycbw3dCSrOSm2Tle84Kn7Jdb-X1T09y9xAgSV41Ro07pvbwK-M0ScGSsIusBx5tzaWFN2/exec", {
                method: "POST",
                body: JSON.stringify({
                    codigo: result.text
                })
            })

            alert("Escaneado: " + result.text)

            // 🔁 reiniciar scanner después del OK
            setTimeout(() => {
                startScanner()
            }, 500)
        }
    })
}

// 🚀 iniciar
startScanner()

</script>

</body>
</html>
