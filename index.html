<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/@zxing/library@latest"></script>
</head>

<body>

<h2>Escanear Zapatillas CHIC 2026 V13</h2>

<p id="status">📷 Listo para escanear...</p>

<video id="video" width="300"></video>

<script>

const codeReader = new ZXing.BrowserBarcodeReader()
const video = document.getElementById('video')

let scanning = true
let lastCode = null

// 🧠 MAPEO TALLES
const talles = {
    "X004T1DV03": "33",
    "X004T1DUXV": "34",
    "X004T16PAB": "35",
    "X004T1078R": "36",
    "X004T18ZNB": "37",
    "X004T19XPP": "38"
}

async function startScanner() {

    await codeReader.decodeFromVideoDevice(null, video, async (result, err) => {

        if (result && scanning) {

            let codigo = result.text.trim()

            // 🚫 ignorar códigos que no son tuyos
            if (!talles[codigo]) return

            // 🚫 evitar duplicados seguidos
            if (codigo === lastCode) return

            lastCode = codigo
            scanning = false

            let talle = talles[codigo]

            // 📡 enviar a Google Sheets
            fetch("https://script.google.com/macros/s/AKfycbw3dCSrOSm2Tle84Kn7Jdb-X1T09y9xAgSV41Ro07pvbwK-M0ScGSsIusBx5tzaWFN2/exec", {
                method: "POST",
                body: new URLSearchParams({
                    codigo: codigo,
                    talle: talle
                })
            })

            // ✅ feedback visual (sin bloquear)
            document.getElementById("status").innerText = "✅ Talle " + talle + " registrado"

            // ⏱️ volver a habilitar escaneo rápido
            setTimeout(() => {
                scanning = true
            }, 200)
        }
    })
}

// 🚀 iniciar
startScanner()

</script>

</body>
</html>
