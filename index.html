<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/@zxing/library@latest"></script>
</head>

<body>

<h2>Escanear Zapatillas CHIC 2026 V6</h2>

<video id="video" width="300"></video>

<script>

const codeReader = new ZXing.BrowserBarcodeReader()
const video = document.getElementById('video')

let controls
let scanning = true

async function startScanner() {

    controls = await codeReader.decodeFromVideoDevice(null, video, (result, err) => {

        if (result && scanning) {

            scanning = false

            // 🛑 detener cámara correctamente
            if (controls) controls.stop()

            fetch("https://script.google.com/macros/s/AKfycbw3dCSrOSm2Tle84Kn7Jdb-X1T09y9xAgSV41Ro07pvbwK-M0ScGSsIusBx5tzaWFN2/exec", {
                method: "POST",
                body: JSON.stringify({
                    codigo: result.text
                })
            })

            alert("Escaneado: " + result.text)

            // 🔁 reiniciar limpio
            setTimeout(() => {
                scanning = true
                startScanner()
            }, 800)
        }
    })
}

// 🚀 iniciar
startScanner()

</script>

</body>
</html>
