<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/@zxing/library@latest"></script>
</head>

<body>

<h2>Escanear Zapatillas CHIC 2026 V8</h2>

<video id="video" width="300"></video>

<script>

const codeReader = new ZXing.BrowserBarcodeReader()
const video = document.getElementById('video')

let controls
let scanning = true
let lastCode = null

// 🧠 MAPEO
const talles = {
    "X004T1DV03": "33",
    "X004T1DUXV": "34",
    "X004T16PAB": "35",
    "X004T1078R": "36",
    "X004T18ZNB": "37",
    "X004T19XPP": "38"
}

async function startScanner() {

    controls = await codeReader.decodeFromVideoDevice(null, video, (result, err) => {

        if (result && scanning) {

            let codigo = result.text.trim()

            // 🚫 ignorar lecturas inválidas
            if (!talles[codigo]) return

            // 🚫 evitar repetir el mismo código seguido
            if (codigo === lastCode) return

            lastCode = codigo
            scanning = false

            if (controls) controls.stop()

            let talle = talles[codigo]

            fetch("https://script.google.com/macros/s/AKfycbw3dCSrOSm2Tle84Kn7Jdb-X1T09y9xAgSV41Ro07pvbwK-M0ScGSsIusBx5tzaWFN2/exec", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    codigo: codigo,
                    talle: talle
                })
            })

            alert("Talle: " + talle)

            setTimeout(() => {
                scanning = true
                startScanner()
            }, 800)
        }
    })
}

startScanner()

</script>

</body>
</html>
